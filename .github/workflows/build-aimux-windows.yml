name: Build Aimux - Windows x64

on:
  workflow_dispatch:
    inputs:
      generate_assets:
        type: boolean
        description: Generate release assets
        default: true
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/lint-*.yml"
      - ".github/workflows/mod-*.yml"

env:
  APP_NAME: Aimux
  BINARY_NAME: aimux
  ORG_NAME: Aimux
  OS_NAME: windows
  VSCODE_QUALITY: stable
  VSCODE_ARCH: x64
  SHOULD_BUILD: yes
  CI_BUILD: no
  SHOULD_BUILD_REH: no
  SHOULD_BUILD_REH_WEB: no
  DISABLE_UPDATE: "no"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64 Installer
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Toolchain ─────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: vscode/**/package-lock.json

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq git libkrb5-dev

      # ── Clone VS Code source ──────────────────────────────────
      - name: Clone VS Code source
        run: ./get_repo.sh

      # ── Prepare: patches + npm ci ─────────────────────────────
      - name: Prepare VS Code (apply patches, install deps)
        run: ./prepare_vscode.sh

      # ── Build Electron app ────────────────────────────────────
      - name: Build Aimux for Windows
        run: ./build.sh

      # ── Wine + Inno Setup for .exe installer ──────────────────
      - name: Install Wine and Inno Setup
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y wine64 wine32
          echo "::group::Download Inno Setup"
          wget -q "https://jrsoftware.org/download.php/innosetup-6.4.3.exe" -O /tmp/innosetup.exe
          echo "::endgroup::"
          echo "::group::Install Inno Setup via Wine"
          wine /tmp/innosetup.exe /VERYSILENT /NORESTART /SUPPRESSMSGBOXES
          echo "::endgroup::"
          echo "Inno Setup installed at:"
          ls -la "$HOME/.wine/drive_c/Program Files (x86)/Inno Setup 6/" || true

      - name: Create Windows .exe installer with ISCC
        run: |
          ISCC="$HOME/.wine/drive_c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          if [[ ! -f "$ISCC" ]]; then
            echo "ERROR: ISCC.exe not found at $ISCC"
            exit 1
          fi

          echo "::group::Run Inno Setup Compiler"
          wine "$ISCC.exe" \
            /DArchitecturesAllowed=x64 \
            /DArchitecturesInstallIn64BitMode=x64 \
            /DSourceDir="${GITHUB_WORKSPACE}/VSCode-win32-x64" \
            "${GITHUB_WORKSPACE}/vscode/build/win32/code.iss"
          echo "::endgroup::"

          echo "Looking for generated .exe files:"
          find "${GITHUB_WORKSPACE}" -name "*.exe" -not -path "*/node_modules/*" -not -path "*/.wine/*" 2>/dev/null || true
          find "${GITHUB_WORKSPACE}/vscode" -name "*.exe" -not -path "*/node_modules/*" 2>/dev/null || true

      - name: Locate and stage installer artifacts
        run: |
          mkdir -p artifacts

          # ISCC outputs to Output/ directory relative to .iss file location
          # or to a configured OutputDir. Search common locations.
          ISS_DIR="${GITHUB_WORKSPACE}/vscode/build/win32"
          FOUND=0

          for candidate in \
            "${ISS_DIR}/Output/"*.exe \
            "${GITHUB_WORKSPACE}/vscode/build/win32/Output/"*.exe \
            "${GITHUB_WORKSPACE}/vscode/"*.exe \
            "${GITHUB_WORKSPACE}/VSCode-win32-x64/"*.exe \
            "${GITHUB_WORKSPACE}/"*.exe; do
            if ls $candidate 2>/dev/null; then
              cp $candidate artifacts/
              FOUND=1
            fi
          done

          # Also check for the standard VSCodium/Aimux output names
          for name in "AimuxSetup" "AimuxUserSetup" "VSCodeSetup" "Setup"; do
            find "${GITHUB_WORKSPACE}" -maxdepth 4 -name "${name}*.exe" \
              -not -path "*/node_modules/*" -not -path "*/.wine/*" \
              -exec cp {} artifacts/ \; 2>/dev/null && FOUND=1 || true
          done

          if [[ "$FOUND" == "0" ]]; then
            echo "WARNING: No .exe installer found. Listing build outputs:"
            find "${GITHUB_WORKSPACE}/vscode/build" -name "*.exe" 2>/dev/null || true
            find "${GITHUB_WORKSPACE}" -maxdepth 2 -name "*.exe" 2>/dev/null || true
          fi

          echo "Artifacts staged:"
          ls -la artifacts/

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: aimux-windows-x64-installer
          path: artifacts/*.exe
          if-no-files-found: warn
          retention-days: 14
