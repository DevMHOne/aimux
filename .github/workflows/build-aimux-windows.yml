name: Build Aimux - Windows x64

on:
  workflow_dispatch:
    inputs:
      generate_assets:
        type: boolean
        description: Generate release assets
        default: true
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/lint-*.yml"
      - ".github/workflows/mod-*.yml"

env:
  APP_NAME: Aimux
  BINARY_NAME: aimux
  ORG_NAME: Aimux
  OS_NAME: windows
  VSCODE_QUALITY: stable
  VSCODE_ARCH: x64
  SHOULD_BUILD: yes
  CI_BUILD: no
  SHOULD_BUILD_REH: no
  SHOULD_BUILD_REH_WEB: no
  DISABLE_UPDATE: "yes"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64 Installer
    runs-on: windows-2022
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    env:
      VSCODE_ARCH: x64
      # Native .exe installer generation via VS Code's bundled Inno Setup
      SHOULD_BUILD_ZIP: "yes"
      SHOULD_BUILD_EXE_SYS: "yes"
      SHOULD_BUILD_EXE_USR: "yes"
      SHOULD_BUILD_MSI: "no"
      SHOULD_BUILD_MSI_NOUP: "no"

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # ── Toolchain (matches official VSCodium CI) ──────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Clone VS Code source ──────────────────────────────────
      - name: Clone VS Code source
        run: ./get_repo.sh

      # ── Build (build.sh does full prepack + packing when CI_BUILD=no) ──
      - name: Build Aimux for Windows
        run: ./build.sh

      # ── Generate native .exe installers (Inno Setup via gulp) ──
      - name: Prepare Windows assets (.exe installers + .zip)
        run: ./prepare_assets.sh

      - name: List generated assets
        run: |
          echo "Assets directory:"
          ls -la assets/ || echo "no assets/ dir"

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: aimux-windows-x64
          path: |
            assets/*.exe
            assets/*.zip
          if-no-files-found: warn
          retention-days: 14
